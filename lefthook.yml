assert_lefthook_installed: true

colors:
  cyan: '#03EDF9'
  gray: '#808080'
  green: '#72F1B8'
  red: '#FE4450'
  yellow: '#FEDE5D'

pre-commit:
  jobs:
    - name: terraform-fmt
      run: shell/hooks/terraform-fmt.sh

    - name: tflint
      run: shell/hooks/tflint.sh

pre-push:
  jobs:
    - name: terraform-validate
      run: shell/hooks/terraform-validate.sh

commit-msg:
  jobs:
    - name: commitlint
      run: yarn commitlint --edit {1}
