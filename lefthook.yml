assert_lefthook_installed: true

colors:
  cyan: '#03EDF9'
  gray: '#808080'
  green: '#72F1B8'
  red: '#FE4450'
  yellow: '#FEDE5D'

pre-commit:
  jobs:
    - name: terraform-fmt
      run: shell/hooks/terraform-fmt.sh

    - name: tflint
      run: shell/hooks/tflint.sh

# These jobs cover branch pushes only. They do NOT run on
# `git push origin HEAD:main`, which is this repository's merge workflow.
#
# Lefthook decides whether a pre-push job has work by diffing against `@{push}`
# — the branch's own push destination — not the ref being pushed to. On an
# FF-push to main the branch has usually already been pushed, so that diff is
# empty and both jobs are skipped with "no matching push files".
#
# Two attempts to work around this failed. Fixing the scripts' internal scope
# logic did nothing, because lefthook skips before the script runs. Overriding
# `files` did nothing either, because that gate is consulted after the push-file
# check. lefthook v2 removed `skip_empty`, and `lefthook run --force` is a CLI
# flag with no config equivalent.
#
# The gap is covered in CI instead: .github/workflows/terraform.yml also runs on
# push to main, so a merge is validated even though this hook stays quiet. Do not
# add a `files:` override here expecting it to help — it looks like it works when
# tested with `lefthook run pre-push`, because that path has no stdin and falls
# through to it.
pre-push:
  jobs:
    - name: terraform-validate
      run: shell/hooks/terraform-validate.sh

    - name: terraform-test
      run: shell/hooks/terraform-test.sh

commit-msg:
  jobs:
    - name: commitlint
      run: yarn commitlint --edit {1}
