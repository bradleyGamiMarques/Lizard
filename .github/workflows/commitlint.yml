name: Lint commits

# The lefthook commit-msg hook already lints locally, but any contributor can
# skip it with `git commit --no-verify`. This workflow is the enforcement point.
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the PR branch
        uses: actions/checkout@v7
        with:
          # commitlint walks the base..head range, so it needs full history.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint commit messages
        run: >
          yarn commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose

      - name: Lint PR title
        # The title is passed through the environment rather than interpolated
        # into the script. Interpolating it directly would let a title
        # containing backticks or $(...) execute as shell.
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | yarn commitlint --verbose
