nodeLinker: node-modules

npmMinimalAgeGate: 1d

# @commitlint/load pulls in cosmiconfig-typescript-loader, which has required
# peer deps on typescript and @types/node. @commitlint/load neither depends on
# nor forwards them, so the requirement never reaches the root workspace where
# they are already installed. Forward the peers up the chain so the root copies
# satisfy them.
packageExtensions:
  "@commitlint/cli@*":
    peerDependencies:
      typescript: ">=5"
      "@types/node": "*"
  "@commitlint/load@*":
    peerDependencies:
      typescript: ">=5"
      "@types/node": "*"
